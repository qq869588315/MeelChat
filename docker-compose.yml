version: "3.9"
services:
  chatgpt-next-web:
    profiles: [ "no-proxy" ]
    container_name: meelchat
    image: ghcr.io/qq869588315/meelchat:latest
    ports:
      - 3000:3000
    environment:
      - OPENAI_API_KEY=$OPENAI_API_KEY
      - GOOGLE_API_KEY=$GOOGLE_API_KEY
      - CODE=$CODE
      - BASE_URL=$BASE_URL
      - OPENAI_ORG_ID=$OPENAI_ORG_ID
      - HIDE_USER_API_KEY=$HIDE_USER_API_KEY
      - DISABLE_GPT4=$DISABLE_GPT4
      - ENABLE_BALANCE_QUERY=$ENABLE_BALANCE_QUERY
      - DISABLE_FAST_LINK=$DISABLE_FAST_LINK
      - OPENAI_SB=$OPENAI_SB
      - MEEL_SYNC_ENABLED=$MEEL_SYNC_ENABLED
      - MEEL_SYNC_DIR=${MEEL_SYNC_DIR:-/data/nextchat-sync}
      - MEEL_SYNC_MAX_BYTES=${MEEL_SYNC_MAX_BYTES:-10485760}
      - MEEL_SYNC_USERS=$MEEL_SYNC_USERS
    volumes:
      - ${MEEL_SYNC_HOST_DIR:-/data/nextchat-sync}:/data/nextchat-sync

  chatgpt-next-web-proxy:
    profiles: [ "proxy" ]
    container_name: meelchat-proxy
    image: ghcr.io/qq869588315/meelchat:latest
    ports:
      - 3000:3000
    environment:
      - OPENAI_API_KEY=$OPENAI_API_KEY
      - GOOGLE_API_KEY=$GOOGLE_API_KEY
      - CODE=$CODE
      - PROXY_URL=$PROXY_URL
      - BASE_URL=$BASE_URL
      - OPENAI_ORG_ID=$OPENAI_ORG_ID
      - HIDE_USER_API_KEY=$HIDE_USER_API_KEY
      - DISABLE_GPT4=$DISABLE_GPT4
      - ENABLE_BALANCE_QUERY=$ENABLE_BALANCE_QUERY
      - DISABLE_FAST_LINK=$DISABLE_FAST_LINK
      - OPENAI_SB=$OPENAI_SB
      - MEEL_SYNC_ENABLED=$MEEL_SYNC_ENABLED
      - MEEL_SYNC_DIR=${MEEL_SYNC_DIR:-/data/nextchat-sync}
      - MEEL_SYNC_MAX_BYTES=${MEEL_SYNC_MAX_BYTES:-10485760}
      - MEEL_SYNC_USERS=$MEEL_SYNC_USERS
    volumes:
      - ${MEEL_SYNC_HOST_DIR:-/data/nextchat-sync}:/data/nextchat-sync
